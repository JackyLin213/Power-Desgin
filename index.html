            <div class="lg:col-span-7 space-y-4 lg:sticky lg:top-20 self-start">
                
                <div class="bg-neutral-900 rounded-2xl shadow-xl overflow-hidden text-neutral-100 flex flex-col border border-neutral-700">
                    <div class="p-3 border-b border-neutral-700 bg-neutral-800 flex justify-between items-center">
                        <h2 class="text-base font-bold text-white flex items-center gap-2">
                            <span class="text-lg">📊</span> 即時頻率響應波德圖
                        </h2>
                        <button id="resetBtn" class="text-xs bg-neutral-700 hover:bg-neutral-600 text-neutral-300 px-3 py-1 rounded transition-colors">
                            重置參數
                        </button>
                    </div>
                    
                    <div id="readoutContainer" class="grid grid-cols-2 sm:grid-cols-5 gap-px bg-neutral-700 text-center text-xs">
                        </div>

                    <div class="p-3 bg-white text-neutral-900 space-y-2">
                        <div class="chart-container" style="height: 28vh; min-height: 200px;">
                            <canvas id="magChart"></canvas>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- App State ---
            let currentMode = 'comp'; // 'comp' or 'plant'
            let currentSubType = '3'; // '1','2','3' or 'buck','boost','buckboost'

            // --- Parameters ---
            const defaultCompParams = { R1: 10, R2: 20, R3: 1, C1: 10, C2: 2.2, C3: 100 }; // kOhm, nF, pF
            const defaultPlantParams = { Vin: 12, Vout: 5, L: 10, C: 100, ESR: 20, Rload: 5 }; // V, V, uH, uF, mOhm, Ohm
            
            let pComp = { ...defaultCompParams };
            let pPlant = { ...defaultPlantParams };

            // Generated Data
            let compData = { fp0: 0, fz1: 0, fz2: 0, fp1: 0, fp2: 0 };
            let plantData = { D: 0, Dprime: 0, Gvd0: 0, f0: 0, fesr: 0, frhp: Infinity, Q: 0 };

            // --- UI Elements ---
            const UI = {
                typeSelect: document.getElementById('typeSelect'),
                logoText: document.getElementById('logoText'),
                sec1Title: document.getElementById('sec1Title'),
                sec2Title: document.getElementById('sec2Title'),
                introText: document.getElementById('introText'),
                mathBlockComp: document.getElementById('mathBlockComp'),
                mathBlockPlant: document.getElementById('mathBlockPlant'),
                compFormulaDisplay: document.getElementById('compFormulaDisplay'),
                compPoleZeroGrid: document.getElementById('compPoleZeroGrid'),
                plantFormulaDisplay: document.getElementById('plantFormulaDisplay'),
                plantMathGain: document.getElementById('plantMathGain'),
                plantMathF0: document.getElementById('plantMathF0'),
                plantMathRHPZ: document.getElementById('plantMathRHPZ'),
                plantMathRHPZBox: document.getElementById('plantMathRHPZBox'),
                readoutContainer: document.getElementById('readoutContainer'),
                slidersContainer: document.getElementById('slidersContainer'),
                resetBtn: document.getElementById('resetBtn'),
                canvas: document.getElementById('circuitCanvas')
            };

            const ctxCanvas = UI.canvas.getContext('2d');

            // --- Formatter ---
            function formatFreq(f) {
                if (f === Infinity || f === 0 || !isFinite(f)) return '-- ';
                if (f >= 1e6) return (f / 1e6).toFixed(2) + ' M';
                if (f >= 1e3) return (f / 1e3).toFixed(2) + ' k';
                return f.toFixed(1) + ' ';
            }

            // --- Core Logic: Compensators ---
            function calcComp() {
                const r1 = pComp.R1 * 1e3; const r2 = pComp.R2 * 1e3; const r3 = pComp.R3 * 1e3;
                const c1 = pComp.C1 * 1e-9; const c2 = pComp.C2 * 1e-9; const c3 = pComp.C3 * 1e-12;
                compData = { fp0: 0, fz1: 0, fz2: 0, fp1: 0, fp2: 0 };

                if (currentSubType === '1') {
                    compData.fp0 = 1 / (2 * Math.PI * r1 * c1);
                } else if (currentSubType === '2') {
                    compData.fp0 = 1 / (2 * Math.PI * r1 * (c2 + c3));
                    compData.fz1 = 1 / (2 * Math.PI * r2 * c2);
                    compData.fp1 = (c2 + c3) / (2 * Math.PI * r2 * c2 * c3);
                } else if (currentSubType === '3') {
                    compData.fp0 = 1 / (2 * Math.PI * r1 * (c2 + c3));
                    compData.fz1 = 1 / (2 * Math.PI * r2 * c2);
                    compData.fz2 = 1 / (2 * Math.PI * (r1 + r3) * c1);
                    compData.fp1 = 1 / (2 * Math.PI * r3 * c1);
                    compData.fp2 = (c2 + c3) / (2 * Math.PI * r2 * c2 * c3);
                }
            }

            // --- Core Logic: Plants ---
            function calcPlant() {
                const L = pPlant.L * 1e-6; const C = pPlant.C * 1e-6;
                const Resr = pPlant.ESR * 1e-3; const R = pPlant.Rload;
                let Vin = pPlant.Vin; let Vout = pPlant.Vout;

                plantData = { D: 0, Dprime: 1, Gvd0: 0, f0: 0, fesr: 0, frhp: Infinity, Q: 0 };
                plantData.fesr = 1 / (2 * Math.PI * Resr * C);

                if (currentSubType === 'buck') {
                    if (Vout > Vin) Vout = Vin * 0.99; // Physical limit
                    plantData.D = Vout / Vin;
                    plantData.Gvd0 = Vin;
                    plantData.f0 = 1 / (2 * Math.PI * Math.sqrt(L * C));
                } else if (currentSubType === 'boost') {
                    if (Vin > Vout) Vout = Vin * 1.01;
                    plantData.D = 1 - (Vin / Vout);
                    plantData.Dprime = 1 - plantData.D;
                    plantData.Gvd0 = Vin / Math.pow(plantData.Dprime, 2);
                    plantData.frhp = (R * Math.pow(plantData.Dprime, 2)) / (2 * Math.PI * L);
                    plantData.f0 = plantData.Dprime / (2 * Math.PI * Math.sqrt(L * C));
                } else if (currentSubType === 'buckboost') {
                    plantData.D = Vout / (Vin + Vout);
                    plantData.Dprime = 1 - plantData.D;
                    plantData.Gvd0 = Vin / Math.pow(plantData.Dprime, 2);
                    plantData.frhp = (R * Math.pow(plantData.Dprime, 2)) / (2 * Math.PI * plantData.D * L);
                    plantData.f0 = plantData.Dprime / (2 * Math.PI * Math.sqrt(L * C));
                }
            }

            // --- Bode Plot Generation ---
            const freqs = [];
            for (let i = 1; i <= 7; i++) { for (let j = 1; j < 10; j++) freqs.push(j * Math.pow(10, i)); }
            freqs.push(1e8);

            function getPlotData() {
                const magData = []; const phaseData = [];
                
                if (currentMode === 'comp') {
                    const { fp0, fz1, fz2, fp1, fp2 } = compData;
                    for (let f of freqs) {
                        let totalMagDB = 0; let totalPhase = -90;
                        if (currentSubType === '1') {
                            totalMagDB = 20 * Math.log10(fp0 / f);
                        } else if (currentSubType === '2') {
                            const mag = (fp0 / f) * Math.sqrt(1 + Math.pow(f / fz1, 2)) / Math.sqrt(1 + Math.pow(f / fp1, 2));
                            totalMagDB = 20 * Math.log10(mag);
                            totalPhase = -90 + Math.atan(f / fz1)*(180/Math.PI) - Math.atan(f / fp1)*(180/Math.PI);
                        } else if (currentSubType === '3') {
                            const mag = (fp0 / f) * Math.sqrt(1 + Math.pow(f / fz1, 2)) * Math.sqrt(1 + Math.pow(f / fz2, 2)) / (Math.sqrt(1 + Math.pow(f / fp1, 2)) * Math.sqrt(1 + Math.pow(f / fp2, 2)));
                            totalMagDB = 20 * Math.log10(mag);
                            totalPhase = -90 + Math.atan(f/fz1)*(180/Math.PI) + Math.atan(f/fz2)*(180/Math.PI) - Math.atan(f/fp1)*(180/Math.PI) - Math.atan(f/fp2)*(180/Math.PI);
                        }
                        magData.push({ x: f, y: totalMagDB }); phaseData.push({ x: f, y: totalPhase });
                    }
                } else {
                    // Plant Plot using exact transfer function coefficients
                    const L = pPlant.L * 1e-6; const C = pPlant.C * 1e-6;
                    const Resr = pPlant.ESR * 1e-3; const R = pPlant.Rload;
                    const { D, Dprime, Gvd0 } = plantData;

                    let coef_D1 = 0, coef_D2 = 0, coef_N_rhp = 0;

                    if (currentSubType === 'buck') {
                        coef_D1 = (L / R) + (Resr * C);
                        coef_D2 = L * C;
                        coef_N_rhp = 0; // No RHPZ
                    } else if (currentSubType === 'boost') {
                        coef_D1 = (L / (R * Math.pow(Dprime, 2))) + (Resr * C);
                        coef_D2 = (L * C) / Math.pow(Dprime, 2);
                        coef_N_rhp = L / (R * Math.pow(Dprime, 2));
                    } else if (currentSubType === 'buckboost') {
                        coef_D1 = (L / (R * Math.pow(Dprime, 2))) + (Resr * C);
                        coef_D2 = (L * C) / Math.pow(Dprime, 2);
                        coef_N_rhp = (D * L) / (R * Math.pow(Dprime, 2));
                    }

                    for (let f of freqs) {
                        const w = 2 * Math.PI * f;
                        // N(jw) = Gvd0 * (1 + j w Resr C) * (1 - j w coef_N_rhp)
                        const mag_N = Gvd0 * Math.sqrt(1 + Math.pow(w * Resr * C, 2)) * Math.sqrt(1 + Math.pow(w * coef_N_rhp, 2));
                        const phase_N = Math.atan2(w * Resr * C, 1) + Math.atan2(-w * coef_N_rhp, 1);

                        // D(jw) = (1 - w^2 coef_D2) + j(w coef_D1)
                        const real_D = 1 - Math.pow(w, 2) * coef_D2;
                        const imag_D = w * coef_D1;
                        const mag_D = Math.sqrt(Math.pow(real_D, 2) + Math.pow(imag_D, 2));
                        const phase_D = Math.atan2(imag_D, real_D);

                        magData.push({ x: f, y: 20 * Math.log10(mag_N / mag_D) });
                        phaseData.push({ x: f, y: (phase_N - phase_D) * (180 / Math.PI) });
                    }
                }
                return { magData, phaseData };
            }

            // --- Chart Init ---
            const chartOpts = {
                responsive: true, maintainAspectRatio: false, animation: { duration: 0 }, interaction: { mode: 'index', intersect: false },
                plugins: { legend: { display: false } },
                scales: { x: { type: 'logarithmic', grid: { color: '#f1f5f9' } } }
            };

            const magChart = new Chart(document.getElementById('magChart'), {
                type: 'line', data: { datasets: [{ data: [], borderColor: '#0ea5e9', borderWidth: 2, pointRadius: 0 }] },
                options: { ...chartOpts, plugins: { title: { display: true, text: 'Gain Magnitude (dB)' } }, scales: { x: chartOpts.scales.x, y: { title: {display:true, text:'dB'} } } }
            });

            const phaseChart = new Chart(document.getElementById('phaseChart'), {
                type: 'line', data: { datasets: [{ data: [], borderColor: '#f59e0b', borderWidth: 2, pointRadius: 0 }] },
                options: { ...chartOpts, plugins: { title: { display: true, text: 'Phase (Degrees)' } }, scales: { x: chartOpts.scales.x, y: { title: {display:true, text:'°'}, ticks:{stepSize:45} } } }
            });

            // --- UI Builders ---
            function buildUI() {
                // Color Themes
                if (currentMode === 'comp') {
                    UI.logoText.classList.replace('text-plant-600', 'text-brand-600');
                    UI.sec1Title.classList.replace('border-plant-500', 'border-brand-500');
                    UI.sec2Title.classList.replace('border-plant-500', 'border-brand-500');
                    UI.mathBlockComp.classList.remove('hidden'); UI.mathBlockPlant.classList.add('hidden');
                } else {
                    UI.logoText.classList.replace('text-brand-600', 'text-plant-600');
                    UI.sec1Title.classList.replace('border-brand-500', 'border-plant-500');
                    UI.sec2Title.classList.replace('border-brand-500', 'border-plant-500');
                    UI.mathBlockComp.classList.add('hidden'); UI.mathBlockPlant.classList.remove('hidden');
                }

                // Text Content
                const content = {
                    comp_1: { title: "Type 1 補償器 (積分器)", desc: "僅包含一個原點極點，提供極高的直流增益以消除穩態誤差。相位會恆定延遲 90 度，且增益以 -20dB/dec 下降。" },
                    comp_2: { title: "Type 2 補償器", desc: "包含 1個原點極點、1個零點 與 1個高頻極點。最大能提供 90 度的相位提升。最常用於電流模式控制的 DC-DC 轉換器。" },
                    comp_3: { title: "Type 3 補償器", desc: "具有 2個零點 和 3個極點，能提供高達 180 度的相位提升，專門用於補償具有 LC 雙極點特性的電壓模式控制轉換器。" },
                    plant_buck: { title: "Buck Converter (降壓轉換器)", desc: "輸出電壓低於輸入電壓。其控制到輸出轉移函數具有經典的 LC 雙極點與由輸出電容帶來的 ESR 零點，相位最多落後 180 度。" },
                    plant_boost: { title: "Boost Converter (升壓轉換器)", desc: "輸出電壓高於輸入電壓。除了 LC 雙極點與 ESR 零點外，由於右半平面零點 (RHPZ) 的存在，會造成額外的 90 度相位延遲，增加了控制迴路設計的難度。" },
                    plant_buckboost: { title: "Buck-Boost Converter (降升壓轉換器)", desc: "可升可降 (輸出極性反轉，此處取絕對值分析)。與 Boost 類似，具有隨責任週期 (Duty) 與負載變化的右半平面零點 (RHPZ)。" }
                };
                let sel = `${currentMode}_${currentSubType}`;
                UI.introText.innerHTML = `<strong class="${currentMode==='comp'?'text-brand-700':'text-plant-700'} text-base">${content[sel].title}：</strong><br>${content[sel].desc}`;

                // MathJax Content update
                if (currentMode === 'comp') {
                    if (currentSubType === '1') {
                        UI.compFormulaDisplay.innerHTML = '$$H(s) = \\frac{1}{s R_1 C_1} = \\frac{\\omega_{p0}}{s}$$';
                        UI.compPoleZeroGrid.innerHTML = `<div class="bg-white/60 p-3 rounded border border-brand-100 shadow-sm text-center col-span-2"><span class="font-bold block mb-1">原點極點 (fp0)</span>\\( f_{p0} = \\frac{1}{2\\pi R_1 C_1} \\)</div>`;
                    } else if (currentSubType === '2') {
                        UI.compFormulaDisplay.innerHTML = '$$H(s) = \\frac{\\omega_{p0}}{s} \\cdot \\frac{1 + \\frac{s}{\\omega_{z1}}}{1 + \\frac{s}{\\omega_{p1}}}$$';
                        UI.compPoleZeroGrid.innerHTML = `<div class="bg-white/60 p-3 rounded border border-brand-100 shadow-sm text-center col-span-2"><span class="font-bold block mb-1">原點極點 (fp0)</span>\\( f_{p0} = \\frac{1}{2\\pi R_1 (C_2 + C_3)} \\)</div><div class="bg-white/60 p-3 rounded border border-brand-100 shadow-sm text-center"><span class="font-bold block mb-1">零點 (fz1)</span>\\( f_{z1} = \\frac{1}{2\\pi R_2 C_2} \\)</div><div class="bg-white/60 p-3 rounded border border-brand-100 shadow-sm text-center"><span class="font-bold block mb-1">極點 (fp1)</span>\\( f_{p1} \\approx \\frac{1}{2\\pi R_2 C_3} \\)</div>`;
                    } else {
                        UI.compFormulaDisplay.innerHTML = '$$H(s) = \\frac{\\omega_{p0}}{s} \\cdot \\frac{(1 + \\frac{s}{\\omega_{z1}})(1 + \\frac{s}{\\omega_{z2}})}{(1 + \\frac{s}{\\omega_{p1}})(1 + \\frac{s}{\\omega_{p2}})}$$';
                        UI.compPoleZeroGrid.innerHTML = `<div class="bg-white/60 p-3 rounded border border-brand-100 shadow-sm text-center"><span class="font-bold block mb-1">原點極點 (fp0)</span>\\( f_{p0} = \\frac{1}{2\\pi R_1 (C_2 + C_3)} \\)</div><div class="bg-white/60 p-3 rounded border border-brand-100 shadow-sm text-center"><span class="font-bold block mb-1">第一零點 (fz1)</span>\\( f_{z1} = \\frac{1}{2\\pi R_2 C_2} \\)</div><div class="bg-white/60 p-3 rounded border border-brand-100 shadow-sm text-center"><span class="font-bold block mb-1">第二零點 (fz2)</span>\\( f_{z2} = \\frac{1}{2\\pi (R_1 + R_3) C_1} \\)</div><div class="bg-white/60 p-3 rounded border border-brand-100 shadow-sm text-center"><span class="font-bold block mb-1">第一極點 (fp1)</span>\\( f_{p1} = \\frac{1}{2\\pi R_3 C_1} \\)</div><div class="bg-white/60 p-3 rounded border border-brand-100 shadow-sm text-center col-span-2"><span class="font-bold block mb-1">第二極點 (fp2)</span>\\( f_{p2} \\approx \\frac{1}{2\\pi R_2 C_3} \\)</div>`;
                    }
                } else {
                    if (currentSubType === 'buck') {
                        UI.plantFormulaDisplay.innerHTML = '$$G_{vd}(s) = V_{in} \\frac{1 + \\frac{s}{\\omega_{esr}}}{1 + s(\\frac{L}{R} + R_{esr}C) + s^2 LC}$$';
                        UI.plantMathRHPZBox.classList.add('hidden');
                        UI.plantMathGain.innerHTML = '\\( V_{in} \\)';
                        UI.plantMathF0.innerHTML = '\\( \\frac{1}{2\\pi\\sqrt{LC}} \\)';
                    } else if (currentSubType === 'boost') {
                        UI.plantFormulaDisplay.innerHTML = '$$G_{vd}(s) = \\frac{V_{in}}{(1-D)^2} \\frac{(1 + \\frac{s}{\\omega_{esr}})(1 - \\frac{s}{\\omega_{rhp}})}{1 + s(\\frac{L}{(1-D)^2 R} + R_{esr}C) + s^2 \\frac{LC}{(1-D)^2}}$$';
                        UI.plantMathRHPZBox.classList.remove('hidden');
                        UI.plantMathGain.innerHTML = '\\( \\frac{V_{in}}{(1-D)^2} \\)';
                        UI.plantMathF0.innerHTML = '\\( \\frac{1-D}{2\\pi\\sqrt{LC}} \\)';
                        UI.plantMathRHPZ.innerHTML = '\\( \\frac{R (1-D)^2}{2\\pi L} \\)';
                    } else {
                        UI.plantFormulaDisplay.innerHTML = '$$G_{vd}(s) = \\frac{V_{in}}{(1-D)^2} \\frac{(1 + \\frac{s}{\\omega_{esr}})(1 - \\frac{s}{\\omega_{rhp}})}{... (分母同 Boost)}$$';
                        UI.plantMathRHPZBox.classList.remove('hidden');
                        UI.plantMathGain.innerHTML = '\\( \\frac{V_{in}}{(1-D)^2} \\)';
                        UI.plantMathF0.innerHTML = '\\( \\frac{1-D}{2\\pi\\sqrt{LC}} \\)';
                        UI.plantMathRHPZ.innerHTML = '\\( \\frac{R (1-D)^2}{2\\pi D L} \\)';
                    }
                }
                if (window.MathJax) MathJax.typesetPromise();

                // Sliders builder
                let slidersHTML = '';
                const buildSlider = (id, label, min, max, step, val, unit, color) => `
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label class="text-xs font-semibold text-neutral-300">${label}</label>
                            <span class="text-xs text-${color}-400 font-mono"><span id="val_${id}">${val}</span> ${unit}</span>
                        </div>
                        <input type="range" id="slider_${id}" data-key="${id}" min="${min}" max="${max}" step="${step}" value="${val}" class="slider-${color}">
                    </div>`;

                if (currentMode === 'comp') {
                    slidersHTML += buildSlider('R1', 'R1 (輸入/上分壓)', 1, 100, 1, pComp.R1, 'kΩ', 'brand');
                    if(currentSubType==='1') slidersHTML += buildSlider('C1', 'C1 (積分電容)', 0.1, 100, 0.1, pComp.C1, 'nF', 'brand');
                    if(currentSubType==='2' || currentSubType==='3') {
                        if(currentSubType==='3') slidersHTML += buildSlider('C1', 'C1 (輸入電容)', 0.1, 100, 0.1, pComp.C1, 'nF', 'brand');
                        slidersHTML += buildSlider('R2', 'R2 (回授主增益)', 1, 200, 1, pComp.R2, 'kΩ', 'brand');
                        slidersHTML += buildSlider('C2', 'C2 (回授零點)', 0.1, 50, 0.1, pComp.C2, 'nF', 'brand');
                        if(currentSubType==='3') slidersHTML += buildSlider('R3', 'R3 (輸入高頻)', 0.1, 20, 0.1, pComp.R3, 'kΩ', 'brand');
                        slidersHTML += buildSlider('C3', 'C3 (高頻極點)', 10, 1000, 10, pComp.C3, 'pF', 'brand');
                    }
                } else {
                    slidersHTML += buildSlider('Vin', 'Vin (輸入電壓)', 5, 48, 1, pPlant.Vin, 'V', 'plant');
                    slidersHTML += buildSlider('Vout', 'Vout (輸出電壓)', 1, 48, 1, pPlant.Vout, 'V', 'plant');
                    slidersHTML += buildSlider('L', 'L (主電感)', 1, 100, 1, pPlant.L, 'μH', 'plant');
                    slidersHTML += buildSlider('C', 'Cout (輸出電容)', 10, 2000, 10, pPlant.C, 'μF', 'plant');
                    slidersHTML += buildSlider('ESR', 'ESR (電容等效電阻)', 1, 100, 1, pPlant.ESR, 'mΩ', 'plant');
                    slidersHTML += buildSlider('Rload', 'R_load (負載電阻)', 1, 50, 0.5, pPlant.Rload, 'Ω', 'plant');
                }
                UI.slidersContainer.innerHTML = slidersHTML;

                // Readouts builder
                let readoutsHTML = '';
                if (currentMode === 'comp') {
                    const rBoxes = [
                        {id:'fp0', label:'原點極點 fp0'}, {id:'fz1', label:'零點 1 fz1', hide:currentSubType==='1'},
                        {id:'fz2', label:'零點 2 fz2', hide:currentSubType!=='3'}, {id:'fp1', label:'極點 1 fp1', hide:currentSubType==='1'},
                        {id:'fp2', label:'極點 2 fp2', hide:currentSubType!=='3'}
                    ];
                    rBoxes.forEach(b => {
                        if(!b.hide) readoutsHTML += `<div class="bg-neutral-800 p-2"><span class="block text-neutral-400 mb-1">${b.label}</span><span id="out_${b.id}" class="font-bold text-white">--</span></div>`;
                    });
                } else {
                    readoutsHTML += `<div class="bg-neutral-800 p-2"><span class="block text-neutral-400 mb-1">Duty (D)</span><span id="out_D" class="font-bold text-plant-400">--</span></div>`;
                    readoutsHTML += `<div class="bg-neutral-800 p-2"><span class="block text-neutral-400 mb-1">DC Gain</span><span id="out_Gvd0" class="font-bold text-white">--</span></div>`;
                    readoutsHTML += `<div class="bg-neutral-800 p-2"><span class="block text-neutral-400 mb-1">LC 雙極點 f0</span><span id="out_f0" class="font-bold text-white">--</span></div>`;
                    readoutsHTML += `<div class="bg-neutral-800 p-2"><span class="block text-neutral-400 mb-1">ESR 零點</span><span id="out_fesr" class="font-bold text-white">--</span></div>`;
                    if(currentSubType !== 'buck') readoutsHTML += `<div class="bg-neutral-800 p-2"><span class="block text-red-400/80 mb-1">RHPZ 零點</span><span id="out_frhp" class="font-bold text-red-400">--</span></div>`;
                }
                UI.readoutContainer.innerHTML = readoutsHTML;

                // Bind Slider Events
                UI.slidersContainer.querySelectorAll('input[type=range]').forEach(slider => {
                    const key = slider.getAttribute('data-key');
                    slider.addEventListener('input', (e) => {
                        const val = parseFloat(e.target.value);
                        document.getElementById(`val_${key}`).textContent = val;
                        if (currentMode === 'comp') pComp[key] = val; else pPlant[key] = val;
                        updateData(); drawCanvas(key);
                    });
                    slider.addEventListener('mouseenter', () => drawCanvas(key));
                    slider.addEventListener('mouseleave', () => drawCanvas(null));
                });
            }

            function updateData() {
                if (currentMode === 'comp') {
                    calcComp();
                    document.getElementById('out_fp0').textContent = formatFreq(compData.fp0) + 'Hz';
                    if(currentSubType!=='1') {
                        document.getElementById('out_fz1').textContent = formatFreq(compData.fz1) + 'Hz';
                        document.getElementById('out_fp1').textContent = formatFreq(compData.fp1) + 'Hz';
                    }
                    if(currentSubType==='3') {
                        document.getElementById('out_fz2').textContent = formatFreq(compData.fz2) + 'Hz';
                        document.getElementById('out_fp2').textContent = formatFreq(compData.fp2) + 'Hz';
                    }
                } else {
                    calcPlant();
                    document.getElementById('out_D').textContent = (plantData.D * 100).toFixed(1) + ' %';
                    document.getElementById('out_Gvd0').textContent = (20 * Math.log10(plantData.Gvd0)).toFixed(1) + ' dB';
                    document.getElementById('out_f0').textContent = formatFreq(plantData.f0) + 'Hz';
                    document.getElementById('out_fesr').textContent = formatFreq(plantData.fesr) + 'Hz';
                    if(currentSubType!=='buck') document.getElementById('out_frhp').textContent = formatFreq(plantData.frhp) + 'Hz';
                }

                const { magData, phaseData } = getPlotData();
                const color = currentMode === 'comp' ? '#0ea5e9' : '#d946ef';
                const bg = currentMode === 'comp' ? 'rgba(14, 165, 233, 0.1)' : 'rgba(217, 70, 239, 0.1)';
                
                magChart.data.datasets[0].data = magData;
                magChart.data.datasets[0].borderColor = color; magChart.data.datasets[0].backgroundColor = bg;
                phaseChart.data.datasets[0].data = phaseData;
                magChart.update(); phaseChart.update();
            }

            // --- Canvas Drawing Logic ---
            function drawCanvas(activeComp = null) {
                const w = UI.canvas.width; const h = UI.canvas.height;
                ctxCanvas.clearRect(0, 0, w, h);
                const baseC = '#475569'; const activeC = currentMode==='comp' ? '#0ea5e9' : '#d946ef';
                ctxCanvas.lineCap = 'round'; ctxCanvas.lineJoin = 'round';

                const setS = (active) => {
                    ctxCanvas.strokeStyle = active ? activeC : baseC; ctxCanvas.fillStyle = active ? activeC : baseC;
                    ctxCanvas.lineWidth = active ? 4 : 2; ctxCanvas.font = active ? 'bold 16px monospace' : 'bold 14px monospace';
                };

                const drawR = (x, y, l, active, v=false) => {
                    setS(active); ctxCanvas.beginPath();
                    if(v) { ctxCanvas.rect(x-8, y-20, 16, 40); ctxCanvas.fillStyle='#f8fafc'; ctxCanvas.fill(); ctxCanvas.stroke(); setS(active); ctxCanvas.textAlign='left'; ctxCanvas.textBaseline='middle'; ctxCanvas.fillText(l, x+12, y); }
                    else { ctxCanvas.rect(x-20, y-8, 40, 16); ctxCanvas.fillStyle='#f8fafc'; ctxCanvas.fill(); ctxCanvas.stroke(); setS(active); ctxCanvas.textAlign='center'; ctxCanvas.textBaseline='bottom'; ctxCanvas.fillText(l, x, y-12); }
                };
                const drawC = (x, y, l, active, v=true) => {
                    setS(active); ctxCanvas.beginPath();
                    if(v) { ctxCanvas.moveTo(x-12, y-4); ctxCanvas.lineTo(x+12, y-4); ctxCanvas.moveTo(x-12, y+4); ctxCanvas.lineTo(x+12, y+4); }
                    else { ctxCanvas.moveTo(x-4, y-12); ctxCanvas.lineTo(x-4, y+12); ctxCanvas.moveTo(x+4, y-12); ctxCanvas.lineTo(x+4, y+12); }
                    ctxCanvas.stroke(); setS(active); ctxCanvas.textAlign=(v?'left':'center'); ctxCanvas.textBaseline=(v?'middle':'bottom');
                    if(v) ctxCanvas.fillText(l, x+18, y); else ctxCanvas.fillText(l, x, y-12);
                };
                const drawL = (x, y, l, active, v=false) => {
                    setS(active); ctxCanvas.beginPath();
                    if(!v) { for(let i=0;i<3;i++) ctxCanvas.arc(x-10+i*10, y, 5, Math.PI, 0); }
                    else { for(let i=0;i<3;i++) ctxCanvas.arc(x, y-10+i*10, 5, -Math.PI/2, Math.PI/2); }
                    ctxCanvas.stroke(); setS(active); ctxCanvas.textAlign=(v?'left':'center'); ctxCanvas.textBaseline=(v?'middle':'bottom');
                    if(v) ctxCanvas.fillText(l, x+10, y); else ctxCanvas.fillText(l, x, y-15);
                };
                const drawDiode = (x, y, dir='up') => {
                    setS(false); ctxCanvas.beginPath();
                    if(dir==='up') { ctxCanvas.moveTo(x, y-10); ctxCanvas.lineTo(x-10, y+10); ctxCanvas.lineTo(x+10, y+10); ctxCanvas.closePath(); ctxCanvas.moveTo(x-10, y-10); ctxCanvas.lineTo(x+10, y-10); }
                    else if(dir==='right') { ctxCanvas.moveTo(x+10, y); ctxCanvas.lineTo(x-10, y-10); ctxCanvas.lineTo(x-10, y+10); ctxCanvas.closePath(); ctxCanvas.moveTo(x+10, y-10); ctxCanvas.lineTo(x+10, y+10); }
                    ctxCanvas.stroke();
                };
                const drawSw = (x, y, v=false) => {
                    setS(false); ctxCanvas.beginPath();
                    if(v) { ctxCanvas.arc(x, y-15, 3, 0, Math.PI*2); ctxCanvas.arc(x, y+15, 3, 0, Math.PI*2); ctxCanvas.moveTo(x, y-15); ctxCanvas.lineTo(x-10, y+10); }
                    else { ctxCanvas.arc(x-15, y, 3, 0, Math.PI*2); ctxCanvas.arc(x+15, y, 3, 0, Math.PI*2); ctxCanvas.moveTo(x-15, y); ctxCanvas.lineTo(x+10, y-10); }
                    ctxCanvas.stroke();
                };
                const drawGnd = (x, y) => {
                    setS(false); ctxCanvas.beginPath(); ctxCanvas.moveTo(x, y); ctxCanvas.lineTo(x, y+10); ctxCanvas.moveTo(x-10, y+10); ctxCanvas.lineTo(x+10, y+10); ctxCanvas.moveTo(x-6, y+15); ctxCanvas.lineTo(x+6, y+15); ctxCanvas.stroke();
                };

                if (currentMode === 'comp') {
                    // Compensator drawing logic (simplified from previous iteration for space)
                    const cy = 160; const ox = 420; const inY = cy - 15;
                    setS(false); ctxCanvas.beginPath(); ctxCanvas.moveTo(ox, cy - 30); ctxCanvas.lineTo(ox + 50, cy); ctxCanvas.lineTo(ox, cy + 30); ctxCanvas.closePath(); ctxCanvas.stroke();
                    ctxCanvas.textAlign='left'; ctxCanvas.fillText('-', ox + 8, cy - 15); ctxCanvas.fillText('+', ox + 8, cy + 15);
                    ctxCanvas.beginPath(); ctxCanvas.moveTo(ox, cy+15); ctxCanvas.lineTo(ox-20, cy+15); ctxCanvas.stroke(); ctxCanvas.textAlign='right'; ctxCanvas.fillText('V_REF', ox-25, cy+15);
                    
                    const vinX=40, inSplitX=90, inJoinX=280, r1Y=cy-55, r3c1Y=cy+25;
                    setS(false); ctxCanvas.fillText('V_OUT(Plant)', vinX-5, inY);
                    ctxCanvas.beginPath(); ctxCanvas.moveTo(vinX, inY); ctxCanvas.lineTo(inSplitX, inY);
                    
                    if (currentSubType === '1' || currentSubType === '2') {
                        ctxCanvas.moveTo(inSplitX, inY); ctxCanvas.lineTo(inJoinX, inY); ctxCanvas.stroke();
                        ctxCanvas.clearRect((inSplitX+inJoinX)/2-25, inY-15, 50, 30); drawR((inSplitX+inJoinX)/2, inY, 'R1', activeComp==='R1');
                    } else {
                        ctxCanvas.moveTo(inSplitX, inY); ctxCanvas.lineTo(inSplitX, r1Y); ctxCanvas.lineTo(inJoinX, r1Y); ctxCanvas.lineTo(inJoinX, inY);
                        ctxCanvas.moveTo(inSplitX, inY); ctxCanvas.lineTo(inSplitX, r3c1Y); ctxCanvas.lineTo(inJoinX, r3c1Y); ctxCanvas.lineTo(inJoinX, inY); ctxCanvas.stroke();
                        ctxCanvas.clearRect((inSplitX+inJoinX)/2-25, r1Y-15, 50, 30); drawR((inSplitX+inJoinX)/2, r1Y, 'R1', activeComp==='R1');
                        ctxCanvas.clearRect(inSplitX+50-25, r3c1Y-15, 50, 30); drawR(inSplitX+50, r3c1Y, 'R3', activeComp==='R3');
                        ctxCanvas.clearRect(inJoinX-50-15, r3c1Y-15, 30, 30); drawC(inJoinX-50, r3c1Y, 'C1', activeComp==='C1', false);
                    }
                    
                    const fbUpX=320;
                    setS(false); ctxCanvas.beginPath(); ctxCanvas.moveTo(inJoinX, inY); ctxCanvas.lineTo(ox, inY); ctxCanvas.stroke();
                    ctxCanvas.beginPath(); ctxCanvas.moveTo(fbUpX, inY); ctxCanvas.lineTo(fbUpX, cy+10); ctxCanvas.stroke(); drawR(fbUpX, cy+30, 'Rbot', false, true); drawGnd(fbUpX, cy+50);
                    
                    const fbJoinX=520, fbTopY=cy-120, fbBotY=cy-70;
                    if(currentSubType==='1') {
                        setS(false); ctxCanvas.beginPath(); ctxCanvas.moveTo(fbUpX, inY); ctxCanvas.lineTo(fbUpX, fbBotY); ctxCanvas.lineTo(fbJoinX, fbBotY); ctxCanvas.lineTo(fbJoinX, cy); ctxCanvas.stroke();
                        ctxCanvas.clearRect((fbUpX+fbJoinX)/2-15, fbBotY-15, 30, 30); drawC((fbUpX+fbJoinX)/2, fbBotY, 'C1', activeComp==='C1', false);
                    } else {
                        setS(false); ctxCanvas.beginPath(); ctxCanvas.moveTo(fbUpX, inY); ctxCanvas.lineTo(fbUpX, fbTopY); ctxCanvas.moveTo(fbUpX, fbTopY); ctxCanvas.lineTo(fbJoinX, fbTopY); ctxCanvas.moveTo(fbUpX, fbBotY); ctxCanvas.lineTo(fbJoinX, fbBotY); ctxCanvas.moveTo(fbJoinX, fbTopY); ctxCanvas.lineTo(fbJoinX, cy); ctxCanvas.stroke();
                        ctxCanvas.clearRect((fbUpX+fbJoinX)/2-15, fbTopY-15, 30, 30); drawC((fbUpX+fbJoinX)/2, fbTopY, 'C3', activeComp==='C3', false);
                        ctxCanvas.clearRect(fbUpX+60-25, fbBotY-15, 50, 30); drawR(fbUpX+60, fbBotY, 'R2', activeComp==='R2');
                        ctxCanvas.clearRect(fbJoinX-60-15, fbBotY-15, 30, 30); drawC(fbJoinX-60, fbBotY, 'C2', activeComp==='C2', false);
                    }
                    setS(false); ctxCanvas.beginPath(); ctxCanvas.moveTo(ox+50, cy); ctxCanvas.lineTo(580, cy); ctxCanvas.stroke();
                } else {
                    // Plant drawing logic
                    const cy = 100; const vinX = 60; const node1X = 200; const node2X = 350; const voutX = 500;
                    setS(false); ctxCanvas.textAlign='right'; ctxCanvas.fillText('Vin', vinX-10, cy);
                    ctxCanvas.textAlign='left'; ctxCanvas.fillText('Vout', voutX+10, cy);
                    
                    if (currentSubType === 'buck') {
                        // Buck: Vin -> Switch -> Node1 -> L -> Node2 -> Vout
                        setS(false); ctxCanvas.beginPath(); ctxCanvas.moveTo(vinX, cy); ctxCanvas.lineTo(node1X-40, cy); ctxCanvas.moveTo(node1X+40, cy); ctxCanvas.lineTo(node2X, cy); ctxCanvas.moveTo(node2X, cy); ctxCanvas.lineTo(voutX, cy); ctxCanvas.stroke();
                        drawSw(node1X, cy, false);
                        ctxCanvas.clearRect(node1X+40, cy-15, 80, 30); drawL(node1X+80, cy, 'L', activeComp==='L', false);
                        // Diode
                        setS(false); ctxCanvas.beginPath(); ctxCanvas.moveTo(node1X, cy); ctxCanvas.lineTo(node1X, cy+30); ctxCanvas.moveTo(node1X, cy+50); ctxCanvas.lineTo(node1X, cy+100); ctxCanvas.stroke(); drawDiode(node1X, cy+40, 'up'); drawGnd(node1X, cy+100);
                    } else if (currentSubType === 'boost') {
                        // Boost: Vin -> L -> Node1 -> Diode -> Node2 -> Vout
                        setS(false); ctxCanvas.beginPath(); ctxCanvas.moveTo(vinX, cy); ctxCanvas.lineTo(node1X, cy); ctxCanvas.moveTo(node1X, cy); ctxCanvas.lineTo(node2X-40, cy); ctxCanvas.moveTo(node2X+40, cy); ctxCanvas.lineTo(voutX, cy); ctxCanvas.stroke();
                        ctxCanvas.clearRect(vinX+40, cy-15, 60, 30); drawL(vinX+70, cy, 'L', activeComp==='L', false);
                        drawDiode(node2X, cy, 'right');
                        // Switch
                        setS(false); ctxCanvas.beginPath(); ctxCanvas.moveTo(node1X, cy); ctxCanvas.lineTo(node1X, cy+30); ctxCanvas.moveTo(node1X, cy+60); ctxCanvas.lineTo(node1X, cy+100); ctxCanvas.stroke(); drawSw(node1X, cy+45, true); drawGnd(node1X, cy+100);
                    } else if (currentSubType === 'buckboost') {
                        // Buck-Boost: Vin -> Switch -> Node1 -> Diode -> Node2 -> Vout
                        setS(false); ctxCanvas.beginPath(); ctxCanvas.moveTo(vinX, cy); ctxCanvas.lineTo(node1X-40, cy); ctxCanvas.moveTo(node1X+40, cy); ctxCanvas.lineTo(node2X-40, cy); ctxCanvas.moveTo(node2X+40, cy); ctxCanvas.lineTo(voutX, cy); ctxCanvas.stroke();
                        drawSw(node1X, cy, false);
                        drawDiode(node2X, cy, 'right'); // Simplified symbol
                        // Inductor
                        setS(false); ctxCanvas.beginPath(); ctxCanvas.moveTo(node1X, cy); ctxCanvas.lineTo(node1X, cy+20); ctxCanvas.moveTo(node1X, cy+70); ctxCanvas.lineTo(node1X, cy+100); ctxCanvas.stroke(); drawL(node1X, cy+45, 'L', activeComp==='L', true); drawGnd(node1X, cy+100);
                    }

                    // Common Output Filter (C, R_esr, R_load) for all plants
                    const outC_X = node2X; const outR_X = voutX - 20;
                    setS(false); ctxCanvas.beginPath();
                    ctxCanvas.moveTo(outC_X, cy); ctxCanvas.lineTo(outC_X, cy+20); ctxCanvas.moveTo(outC_X, cy+40); ctxCanvas.lineTo(outC_X, cy+60);
                    ctxCanvas.moveTo(outR_X, cy); ctxCanvas.lineTo(outR_X, cy+20); ctxCanvas.moveTo(outR_X, cy+70); ctxCanvas.lineTo(outR_X, cy+100);
                    ctxCanvas.stroke();
                    drawC(outC_X, cy+30, 'C', activeComp==='C', true);
                    drawR(outC_X, cy+80, 'ESR', activeComp==='ESR', true);
                    drawGnd(outC_X, cy+110);
                    drawR(outR_X, cy+45, 'R_load', activeComp==='Rload', true);
                    drawGnd(outR_X, cy+100);
                }
            }

            // --- Initialization ---
            UI.typeSelect.addEventListener('change', (e) => {
                const parts = e.target.value.split('_');
                currentMode = parts[0]; currentSubType = parts[1];
                buildUI(); updateData(); drawCanvas();
            });

            UI.resetBtn.addEventListener('click', () => {
                if(currentMode==='comp') pComp = {...defaultCompParams}; else pPlant = {...defaultPlantParams};
                buildUI(); updateData(); drawCanvas();
            });

            buildUI(); updateData(); drawCanvas();
        });
    </script>
</body>
</html>
